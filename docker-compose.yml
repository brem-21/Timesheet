services:
  postgres:
    image: postgres:16-alpine
    container_name: clockit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clockit
      POSTGRES_USER: clockit
      POSTGRES_PASSWORD: clockit_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/lib/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clockit -d clockit"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: clockit-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@clockit.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  app:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: clockit-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./src/.env.local
    environment:
      DATABASE_URL: postgresql://clockit:clockit_password@postgres:5432/clockit

volumes:
  postgres_data:
  pgadmin_data:
