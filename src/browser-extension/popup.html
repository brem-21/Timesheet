<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 280px;
      background: #f9fafb;
      color: #111827;
    }
    .header {
      background: #1e1e2e;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 28px; height: 28px;
      background: #6366f1;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .header h1 { font-size: 14px; font-weight: 700; }
    .header p  { font-size: 11px; color: #a0a0b8; margin-top: 1px; }

    .body { padding: 14px 16px; space-y: 12px; }

    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    label { font-size: 12px; font-weight: 600; color: #374151; }

    .toggle {
      position: relative; width: 40px; height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #d1d5db; border-radius: 22px; cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: ""; position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: white; border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #6366f1; }
    input:checked + .slider::before { transform: translateX(18px); }

    .url-input {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      background: white;
      color: #374151;
      margin-bottom: 8px;
    }
    .url-input:focus { outline: none; border-color: #6366f1; }

    .save-btn {
      width: 100%;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .save-btn:hover { background: #4f46e5; }

    .status {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      color: #6b7280;
      min-height: 16px;
    }
    .status.ok   { color: #059669; }
    .status.err  { color: #dc2626; }

    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⏱</div>
    <div>
      <h1>Clock-It Tracker</h1>
      <p>Browser activity logger</p>
    </div>
  </div>

  <div class="body">
    <div class="row">
      <label for="toggle">Tracking enabled</label>
      <label class="toggle">
        <input type="checkbox" id="toggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <hr class="divider" />

    <label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:6px">
      Clock-It URL
    </label>
    <input
      type="text"
      id="clockItUrl"
      class="url-input"
      placeholder="http://localhost:3000"
    />
    <button class="save-btn" id="saveBtn">Save</button>
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
